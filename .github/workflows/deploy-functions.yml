name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 1.207.9

      - name: Verify project ref and token
        run: |
          echo "Project ref length: ${#SUPABASE_PROJECT_REF}"
          curl -s -o /tmp/proj.json -w "HTTP %{http_code}" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
          echo ""
          cat /tmp/proj.json | head -c 200
          echo ""
          echo "Listing functions:"
          curl -s -o /tmp/funcs.json -w "HTTP %{http_code}" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/functions" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
          echo ""
          cat /tmp/funcs.json | head -c 500
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy edge functions
        run: |
          supabase functions deploy infer-intent     --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --debug
          supabase functions deploy build-context    --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --debug
          supabase functions deploy validate-context --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
